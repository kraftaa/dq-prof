name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-wheels-linux:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: .
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install maturin and zig
        run: python -m pip install --upgrade pip maturin ziglang
      - name: Build wheel (Linux targets)
        run: maturin build --release --strip --interpreter python3 --target ${{ matrix.target }} --zig --out python/target/wheels
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: python/target/wheels/*.whl

  build-wheels-macos:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: .
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build wheel (macOS targets)
        run: maturin build --release --strip --interpreter python3 --target ${{ matrix.target }} --out python/target/wheels
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: python/target/wheels/*.whl

  build-binaries:
    if: false # disabled: wheels already ship the binary; drop standalone tarballs to save minutes

  publish-pypi:
    needs: [build-wheels-linux, build-wheels-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@v1.8.14
        with:
          packages-dir: dist

  github-release:
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
