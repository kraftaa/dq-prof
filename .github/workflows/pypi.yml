name: publish-pypi

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  build-linux:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install maturin and zig (for cross build)
        run: python -m pip install --upgrade pip maturin ziglang
      - name: Build wheel (Linux targets)
        working-directory: python
        run: maturin build --release --strip --interpreter python3 --target ${{ matrix.target }} --zig
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: python/target/wheels/*.whl

  build-macos:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build wheel (macOS targets)
        working-directory: python
        run: maturin build --release --strip --interpreter python3 --target ${{ matrix.target }}
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: python/target/wheels/*.whl

  publish:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@v1.8.14
        with:
          packages-dir: dist
