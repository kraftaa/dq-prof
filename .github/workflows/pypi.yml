name: publish-pypi

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  build-wheel:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          # To re-enable macOS wheel builds, uncomment below (costs 10x minutes):
          # - os: macos-latest
          #   python: "3.11"
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: .
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: ./release.sh
      - name: Embed binary into Python package
        run: ./python/prepare_binary.sh
      - name: Verify embedded binary
        run: |
          ls -l dist || true
          ls -l python/dq_prof/bin || true
          test -f python/dq_prof/bin/dq-prof
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build wheel
        working-directory: python
        run: python -m build
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: python/dist/*.whl

  publish:
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: wheels
      - name: Inspect wheels
        run: |
          ls -l wheels
          python - <<'PY'
import pathlib, zipfile, sys
found = False
for whl in pathlib.Path("wheels").glob("*.whl"):
    found = True
    with zipfile.ZipFile(whl) as z:
        meta = [m for m in z.namelist() if m.endswith(".dist-info/METADATA")]
        if not meta:
            print(f"{whl}: no METADATA", file=sys.stderr)
            sys.exit(1)
        data = z.read(meta[0]).decode("utf-8", errors="replace")
        print(f"---- {whl} ----")
        for line in data.splitlines()[:8]:
            print(line)
if not found:
    print("No wheels found", file=sys.stderr)
    sys.exit(1)
PY
      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@v1.8.14
        with:
          packages-dir: wheels
